<!doctype html>
<!--
  favicon.html — Browser/tab icon for grid-collection.com
  CAPTURE AT EXACTLY 512 × 512 px → export as  favicon.png  (place in site root).
  5x5 grid with a real, rule-compliant 3-move sequence (no connecting path):
  filled numbers (blue), current (orange), possible moves (orange highlight),
  active + passive cells.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 512px; height: 512px; overflow: hidden; }

      .tile {
        width: 512px;
        height: 512px;
        border-radius: 112px; /* ~22% rounded square */
        background:
          radial-gradient(380px 300px at 72% 22%, rgba(255, 107, 53, 0.22), transparent 60%),
          linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      }

      .grid {
        width: 360px;
        height: 360px;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(5, 1fr);
        gap: 14px;
      }

      .c {
        border-radius: 14px;
        background: #2a2a4e; /* active */
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        font-weight: 900;
        color: #fff;
      }
      .c.pass { background: #21213a; }
      .c.blue { background: linear-gradient(160deg, #1a6aac, #004e89); }
      .c.orange {
        background: linear-gradient(160deg, #ff6b35, #e85a28);
        box-shadow: 0 0 0 5px rgba(255, 107, 53, 0.28), 0 0 34px rgba(255, 107, 53, 0.55);
      }
      .c.move { box-shadow: inset 0 0 0 5px #ff6b35; }
    </style>
  </head>
  <body>
    <div class="tile">
      <!-- idx 0..24: moves 1(idx16)->2(idx1)->3(idx13 current); next moves idx10, idx21 -->
      <div class="grid">
        <div class="c pass"></div>
        <div class="c blue">2</div>
        <div class="c"></div>
        <div class="c"></div>
        <div class="c pass"></div>
        <div class="c pass"></div>
        <div class="c"></div>
        <div class="c"></div>
        <div class="c"></div>
        <div class="c pass"></div>
        <div class="c move"></div>
        <div class="c"></div>
        <div class="c"></div>
        <div class="c orange">3</div>
        <div class="c"></div>
        <div class="c pass"></div>
        <div class="c blue">1</div>
        <div class="c"></div>
        <div class="c"></div>
        <div class="c pass"></div>
        <div class="c pass"></div>
        <div class="c move"></div>
        <div class="c"></div>
        <div class="c"></div>
        <div class="c pass"></div>
      </div>
    </div>
  </body>
</html>
